name: Kratest — initial scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  kratest-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout kratest
        uses: actions/checkout@v4
        with:
          repository: KoortHendrik/kratest
          path: kratest-agent
          token: ${{ secrets.KRATEST_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -e kratest-agent/

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install
        working-directory: kratest-agent

      - name: Use source repo agent config
        run: |
          if [ -f agent.config.yml ]; then
            cp agent.config.yml kratest-agent/kratest/agent.config.yml
            echo "Using source repo agent.config.yml"
          else
            echo "No agent.config.yml found in source repo, using kratest default"
          fi

      - name: Run kratest scan
        run: python -m kratest.main
        env:
          PYTHONPATH: ${{ github.workspace }}/kratest-agent
          KRATEST_TOKEN: ${{ secrets.KRATEST_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KRATEST_MODE: scan
          SCAN_REPO: ${{ github.repository }}

      - name: Upload kratest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kratest-log
          path: kratest.log
          if-no-files-found: ignore
