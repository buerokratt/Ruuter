name: Kratest — generate tests for PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'DSL/GET/*.yml'
      - 'DSL/POST/*.yml'

jobs:
  kratest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout kratest
        uses: actions/checkout@v4
        with:
          repository: KoortHendrik/kratest
          path: kratest-agent
          token: ${{ secrets.KRATEST_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -e kratest-agent/

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install
        working-directory: kratest-agent

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: kratest-agent

      - name: Use source repo agent config
        run: |
          if [ -f agent.config.yml ]; then
            cp agent.config.yml kratest-agent/kratest/agent.config.yml
            echo "Using source repo agent.config.yml"
          else
            echo "No agent.config.yml found in source repo, using kratest default"
          fi

      - name: Start mock HTTP server
        run: |
          python3 -c "
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self): self._respond()
              def do_POST(self): self._respond()
              def _respond(self):
                  body = json.dumps({'response': 'ok'}).encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Content-Length', len(body))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *args): pass
          HTTPServer(('', 3000), Handler).serve_forever()
          " &
          sleep 2

      - name: Run kratest
        run: python -m kratest.main
        env:
          PYTHONPATH: ${{ github.workspace }}/kratest-agent
          KRATEST_TOKEN: ${{ secrets.KRATEST_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KRATEST_MODE: pr
          PR_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_URL: http://localhost:3000
