name: Kratest — generate tests for PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'DSL/GET/*.yml'
      - 'DSL/POST/*.yml'

jobs:
  kratest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout kratest
        uses: actions/checkout@v4
        with:
          repository: KoortHendrik/kratest
          path: kratest-agent
          token: ${{ secrets.KRATEST_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -e kratest-agent/

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install
        working-directory: kratest-agent

      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: kratest-agent

      - name: Start Ruuter
        run: |
          docker run -d \
            --name ruuter \
            -p 8080:8080 \
            -v ${{ github.workspace }}/DSL:/DSL \
            -e "application.config-path=/DSL" \
            -e "application.incomingRequests.allowedMethodTypes=POST,GET" \
            -e "application.DSL.allowedFiletypes=.yml,.yaml" \
            -e "application.DSL.processedFiletypes=.yml,.yaml" \
            -e "application.stopInCaseOfException=false" \
            -e "application.CORS.allowedOrigins=*" \
            ghcr.io/buerokratt/ruuter:v2.2.8

      - name: Wait for Ruuter
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8080 && break
            echo "Waiting for Ruuter... ($i/30)"
            sleep 2
          done

      - name: Use source repo agent config
        run: |
          if [ -f agent.config.yml ]; then
            cp agent.config.yml kratest-agent/kratest/agent.config.yml
            echo "Using source repo agent.config.yml"
          else
            echo "No agent.config.yml found in source repo, using kratest default"
          fi

      - name: Run kratest
        run: python -m kratest.main
        env:
          PYTHONPATH: ${{ github.workspace }}/kratest-agent
          KRATEST_TOKEN: ${{ secrets.KRATEST_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          KRATEST_MODE: pr
          PR_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_URL: http://localhost:8080
