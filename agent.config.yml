target_repo: KoortHendrik/TDD-Playwright

# Branch to scan in run_scan_mode.
source_branch: main
# Base branch for generated test PRs opened against target_repo.
target_branch: dev
# Prefix used for all branches kratest creates (e.g. kratest/pr-42-...).
branch_prefix: kratest

llm:
  provider: groq          # provider options: groq | ollama | anthropic | openai | gemini
  model: llama-3.3-70b-versatile
  temperature: 0.2
  timeout: 60             # API request timeout in seconds (increase for Ollama: 120+)
  retries: 2              # number of generation attempts on parse failure
  max_tokens: 4096        # max tokens in LLM response (mainly relevant for Anthropic)
  # endpoint: ""          # override API URL (e.g. custom Ollama host or proxy)

runner:
  timeout: 300            # max seconds to wait for playwright test execution

reporter:
  pr_comment: true
  # github_check requires a GitHub App token, not a PAT.
  # Set to true once a GitHub App is configured.
  github_check: false
  # Label added to the generated test PR to trigger downstream CI workflows.
  # Set to "" to disable.
  trigger_label: "run-at-tests"

# Set to true to execute generated tests before opening the test PR.
# Requires a running service at BASE_URL. Leave false in CI without a live env.
run_tests: true

generators:
  - name: api
    type: playwright_api
    watch_patterns:
      - "DSL/GET/*.yml"
      - "DSL/POST/*.yml"
    target_path: tests/api/smoke/
    template_pattern: "*.smoke.js"
    base_url: "http://localhost:3000"
    context: >
      Ruuter is a DSL orchestrator. Endpoints are defined as YAML files
      in DSL/GET/ and DSL/POST/. All endpoints return {"response": value} JSON.
    extra_rules:
      - "Assert response body contains 'response' field"

  - name: ui
    type: playwright_ui
    watch_patterns:
      - "src/**/*.tsx"
    target_path: tests/admin/
    template_pattern: "*.spec.js"
    base_url: "http://localhost:3000"
    context: "React admin components for Bürokratt admin interface."
